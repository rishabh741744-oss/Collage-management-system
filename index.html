<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team P for Problem | Student Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes swing {
            0% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }
        .cute-character {
            display: inline-block;
            animation: swing 2s ease-in-out infinite;
            cursor: pointer;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .book-container {
            perspective: 1000px;
        }
        .book {
            transition: transform 1s;
            transform-style: preserve-3d;
        }
        .book:hover {
            transform: rotateY(-30deg);
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-400">P for Problem <span class="text-sm font-light text-gray-400">x Firebox</span></h1>
        <div id="logout-container" class="cursor-pointer flex items-center gap-2 hover:text-red-400 transition-all">
            <span id="logout-text">Logout</span>
            <i data-lucide="log-out" id="logout-icon"></i>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10">
        
        <div class="flex flex-col lg:flex-row items-center justify-around gap-10">
            <div class="book-container w-full max-w-md">
                <div class="book glass p-8 shadow-2xl relative">
                    <div class="absolute -top-12 left-1/2 -translate-x-1/2 text-5xl cute-character">
                        🦉
                        <div class="text-xs text-blue-300 font-mono mt-1">Legs Swinging...</div>
                    </div>
                    
                    <h2 class="text-3xl font-bold mb-6 text-center">Student Portal</h2>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm mb-1 text-gray-300">Student ID</label>
                            <input type="text" class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none transition" placeholder="Enter ID...">
                        </div>
                        <div>
                            <label class="block text-sm mb-1 text-gray-300">Password</label>
                            <input type="password" class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:border-blue-500 outline-none transition" placeholder="••••••••">
                        </div>
                        <button type="button" onclick="showDashboard()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transform hover:scale-105 transition">
                            Open Dashboard (Sync with Firebox)
                        </button>
                    </form>
                </div>
            </div>

            <div id="dashboard" class="w-full lg:w-2/3 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass p-6 text-center">
                        <i data-lucide="users" class="mx-auto mb-2 text-blue-400"></i>
                        <h3 class="text-gray-400">Total Students</h3>
                        <p class="text-2xl font-bold">1,250</p>
                    </div>
                    <div class="glass p-6 text-center">
                        <i data-lucide="book-open" class="mx-auto mb-2 text-green-400"></i>
                        <h3 class="text-gray-400">Active Courses</h3>
                        <p class="text-2xl font-bold">48</p>
                    </div>
                    <div class="glass p-6 text-center">
                        <i data-lucide="database" class="mx-auto mb-2 text-purple-400"></i>
                        <h3 class="text-gray-400">Firebox Storage</h3>
                        <p class="text-2xl font-bold text-sm">85% Optimized</p>
                    </div>
                </div>

                <div class="glass p-8">
                    <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart-3"></i> Attendance Analytics
                    </h3>
                    <div class="h-32 w-full flex items-end gap-2">
                        <div class="bg-blue-500 w-full rounded-t" style="height: 60%"></div>
                        <div class="bg-blue-500 w-full rounded-t" style="height: 80%"></div>
                        <div class="bg-blue-400 w-full rounded-t" style="height: 40%"></div>
                        <div class="bg-blue-600 w-full rounded-t" style="height: 90%"></div>
                        <div class="bg-blue-300 w-full rounded-t" style="height: 70%"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Logout Animation (Bird stealing text concept)
        const logoutBtn = document.getElementById('logout-container');
        const logoutText = document.getElementById('logout-text');

        logoutBtn.addEventListener('mouseenter', () => {
            logoutText.style.transition = "all 0.5s ease";
            logoutText.style.transform = "translateY(-50px) rotate(15deg)";
            logoutText.style.opacity = "0";
            setTimeout(() => {
                logoutText.innerText = "Bye!";
                logoutText.style.transform = "translateY(0) rotate(0)";
                logoutText.style.opacity = "1";
            }, 500);
        });

        // Simple Dashboard Toggle
        function showDashboard() {
            alert("Syncing with Firebox... Login Successful!");
            document.getElementById('dashboard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
