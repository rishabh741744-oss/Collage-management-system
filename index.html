<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVerse - Smart Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, push, remove, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAnajb7aYGO0KWKSWT5SJZnpT0-lPoESnw",
            authDomain: "student-management-37282.firebaseapp.com",
            databaseURL: "https://student-management-37282-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "student-management-37282",
            storageBucket: "student-management-37282.firebasestorage.app",
            messagingSenderId: "760085295267",
            appId: "1:760085295267:web:cd7420ce5e2885f005cf16"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Making Firebase global for easier access in simple scripts
        window.db = db; window.dbRef = ref; window.dbSet = set;
        window.dbGet = get; window.dbPush = push; window.dbRemove = remove;
        window.dbUpdate = update; window.onValue = onValue;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .bg-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #db2777 100%); background-attachment: fixed; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-gradient min-h-screen">
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full glass rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <i data-lucide="graduation-cap" class="w-16 h-16 text-blue-400 mx-auto mb-4"></i>
                <h1 class="text-4xl font-bold text-white mb-2">EduVerse</h1>
                <p class="text-blue-200">Smart Student Management</p>
            </div>
            <div class="space-y-4">
                <select id="role" class="w-full bg-white/20 text-white border border-white/30 p-3 rounded-lg outline-none">
                    <option value="admin" class="text-gray-800">👨‍💼 Admin</option>
                    <option value="student" class="text-gray-800">🎓 Student</option>
                </select>
                <input id="username" type="text" placeholder="Username" class="w-full bg-white/20 text-white p-3 rounded-lg border border-white/30 outline-none">
                <input id="password" type="password" placeholder="Password" class="w-full bg-white/20 text-white p-3 rounded-lg border border-white/30 outline-none">
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-semibold btn-hover">Login</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen p-4">
        <div class="max-w-7xl mx-auto">
            <nav class="glass rounded-2xl p-4 mb-6 flex justify-between items-center text-white">
                <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="graduation-cap"></i> EduVerse</h1>
                <button onclick="location.reload()" class="bg-red-500/80 px-4 py-2 rounded-lg btn-hover">Logout</button>
            </nav>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="glass p-4 rounded-xl text-white">
                    <p class="text-sm opacity-80">Total Students</p>
                    <p class="text-2xl font-bold" id="totalCount">0</p>
                </div>
                </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-semibold text-white mb-4">Student Records</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-white">
                        <thead class="bg-white/10">
                            <tr>
                                <th class="p-3 text-left">Name</th>
                                <th class="p-3 text-left">Roll No</th>
                                <th class="p-3 text-left">CGPA</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'admin' && pass === 'admin123') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                alert('Invalid Credentials!');
            }
        }

        function loadData() {
            // Simplified Firebase fetch logic
            console.log("Fetching student data...");
        }
    </script>
</body>
</html>
