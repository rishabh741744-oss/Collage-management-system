<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P for Problem v4.2 | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        deepBlue: '#020617',
                        neonBlue: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            background-image:
                radial-gradient(at 27% 37%, hsla(215, 98%, 61%, 0.15) 0px, transparent 50%),
                radial-gradient(at 97% 21%, hsla(125, 98%, 72%, 0.1) 0px, transparent 50%),
                radial-gradient(at 52% 99%, hsla(355, 98%, 76%, 0.1) 0px, transparent 50%),
                radial-gradient(at 10% 29%, hsla(256, 96%, 67%, 0.15) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }
  .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
  .neon-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
  .page-section { display: none; }
  .active-page { display: block; animation: fadeIn 0.3s ease-in-out; }
  .nav-btn.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3) 0%, rgba(147, 51, 234, 0.3) 100%);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #60a5fa;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
     .nav-container { overflow-x: auto; }
     .nav-container::-webkit-scrollbar { display: none; }
        }
        .break-all { word-break: break-all; }
        .editable:hover { outline: 2px dashed #3b82f6; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-panel p-8 md:p-10 rounded-3xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold neon-text mb-2">P for Problem</h1>
                <p class="text-slate-400 text-sm">v4.2 Admin Control</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-300 mb-2">Login As</label>
                    <select id="login-role" class="w-full bg-slate-900/80 border-slate-700 rounded-xl p-3 text-white outline-none focus:border-blue-500" onchange="updateLoginID()">
                        <option value="admin">Administrator</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-2">Roll Number / Admin ID</label>
                    <input type="text" id="login-id" value="admin" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-2">Password</label>
                    <input type="password" id="login-pass" value="admin123" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-blue-500">
                </div>
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text
