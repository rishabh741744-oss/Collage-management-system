<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVerse - Smart Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
          apiKey: "AIzaSyAnajb7aYGO0KWKSWT5SJZnpT0-lPoESnw",
          authDomain: "student-management-37282.firebaseapp.com",
          databaseURL: "https://student-management-37282-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "student-management-37282",
          storageBucket: "student-management-37282.firebasestorage.app",
          messagingSenderId: "760085295267",
          appId: "1:760085295267:web:cd7420ce5e2885f005cf16"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db; window.dbRef = ref; window.dbSet = set; window.dbGet = get; window.dbPush = push; window.dbRemove = remove; window.dbUpdate = update;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .bg-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #db2777 100%); background-attachment: fixed; }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-gradient min-h-screen">
    
    <div class="fixed top-6 right-6 w-20 h-20 z-40 floating">
        <div class="w-full h-full bg-gradient-to-br from-blue-400 to-purple-600 rounded-2xl flex items-center justify-center shadow-2xl">
            <i data-lucide="bot" class="w-10 h-10 text-white"></i>
        </div>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full glass rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="flex justify-center mb-4">
                    <i data-lucide="graduation-cap" class="w-16 h-16 text-blue-400"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">EduVerse</h1>
                <p class="text-blue-200">Smart Student Management</p>
                <div class="mt-2 flex justify-center gap-2 text-sm text-green-300">
                    <span class="flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <span id="liveCount">Loading...</span>
                    </span>
                </div>
            </div>

            <div class="space-y-4">
                <select id="role" class="w-full bg-white/20 text-white border border-white/30 p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    <option value="" class="text-gray-800">-- Select Role --</option>
                    <option value="admin" class="text-gray-800">👨‍💼 Admin</option>
                    <option value="student" class="text-gray-800">🎓 Student</option>
                    <option value="parent" class="text-gray-800">👨‍👩‍👧 Parent</option>
                </select>
                <input id="username" type="text" placeholder="Username" class="w-full bg-white/20 text-white placeholder-blue-200 border border-white/30 p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                <input id="password" type="password" placeholder="Password" class="w-full bg-white/20 text-white placeholder-blue-200 border border-white/30 p-3 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                <button onclick="doLogin()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-semibold btn-hover">Login to Portal 🚀</button>
                <button onclick="guestLogin()" class="w-full bg-white/20 text-white py-3 rounded-lg font-semibold btn-hover border border-white/30">Try Demo Account 👀</button>
            </div>

            <div class="mt-6 text-xs text-center text-blue-200">
                <p><b>Default Admin:</b> admin / admin123</p>
                <p><b>Demo Guest:</b> guest / guest123</p>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen p-4">
        <div class="max-w-7xl mx-auto">
            <nav class="glass rounded-2xl p-4 mb-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-blue-400"></i>
                    <div>
                        <h1 class="text-2xl font-bold text-white">EduVerse</h1>
                        <p class="text-blue-200 text-sm">Welcome, <span id="userInfo" class="font-semibold"></span></p>
                    </div>
                </div>
                <button onclick="doLogout()" class="bg-red-500/80 hover:bg-red-600 text-white px-4 py-2 rounded-lg btn-hover flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </button>
            </nav>

            <!-- FIXED: Har card ka </div> properly close kiya -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="glass rounded-xl p-4 text-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-blue-200 text-sm">Total Students</p>
                            <p class="text-2xl font-bold" id="totalStudents">0</p>
                        </div>
                        <i data-lucide="users" class="w-8 h-8 text-blue-400"></i>
                    </div>
                <div class="glass rounded-xl p-4 text-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-blue-200 text-sm">Active Today</p>
                            <p class="text-2xl font-bold">0</p>
                        </div>
                        <i data-lucide="activity" class="w-8 h-8 text-green-400"></i>
                    </div>
                </div>
                <div class="glass rounded-xl p-4 text-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-blue-200 text-sm">Avg Attendance</p>
                            <p class="text-2xl font-bold">0%</p>
                        </div>
                        <i data-lucide="calendar-check" class="w-8 h-8 text-purple-400"></i>
                    </div>
                </div>
                <div class="glass rounded-xl p-4 text-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-blue-200 text-sm">Top Performer</p>
                            <p class="text-lg font-bold">-</p>
                        </div>
                        <i data-lucide="trophy" class="w-8 h-8 text-yellow-400"></i>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl p-6">
                <div id="userManagePanel" class="mb-8 p-4 bg-blue-500/20 rounded-xl border border-blue-400/30 hidden">
                    <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> Create New User Account
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <select id="newUserRole" class="bg-white/20 text-white border border-white/30 p-2 rounded-lg">
                            <option value="student" class="text-gray-800">Student</option>
                            <option value="parent" class="text-gray-800">Parent</option>
                        </select>
                        <input id="newUsername" type="text" placeholder="Username/Roll No" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <input id="newPassword" type="text" placeholder="Password" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <input id="newUserFullName" type="text" placeholder="Full Name" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <button onclick="createUser()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg btn-hover">Create User</button>
                    </div>
                </div>

                <div id="adminPanel" class="mb-8 p-4 bg-white/10 rounded-xl border border-white/20 hidden">
                    <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                        <i data-lucide="file-plus" class="w-5 h-5"></i> Add / Edit Student Data
                    </h2>
                    <input type="hidden" id="editIndex">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input id="name" type="text" placeholder="Student Name" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <input id="roll" type="text" placeholder="Roll Number" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <input id="course" type="text" placeholder="Course" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                        <input id="email" type="text" placeholder="Email" class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg">
                    </div>
                    <button onclick="saveStudent()" class="mt-4 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg btn-hover">Save Student 💾</button>
                </div>

                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <input id="searchInput" type="text" onkeyup="showStudents()" placeholder="🔍 Search students..." class="bg-white/20 text-white placeholder-blue-200 border border-white/30 p-2 rounded-lg flex-1">
                    <button onclick="downloadPDF()" class="bg-red-500/80 hover:bg-red-600 text-white px-4 py-2 rounded-lg btn-hover flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Download PDF
                    </button>
                </div>

                <div class="overflow-x-auto rounded-xl">
                    <table class="w-full">
                        <thead class="bg-white/20">
                            <tr class="text-white">
                                <th class="p-3 text-left">S.No</th>
                                <th class="p-3 text-left">Name</th>
                                <th class="p-3 text-left">Roll No</th>
                                <th class="p-3 text-left">Course</th>
                                <th class="p-3 text-left">Email</th>
                                <th id="actionHead" class="p-3 text-left hidden">Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable" class="text-white"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 hidden z-50"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script>
        lucide.createIcons();
        let currentUser = null;

        async function updateLiveCount() {
            try {
                const usersRef = window.dbRef(window.db, 'users');
                const snapshot = await window.dbGet(usersRef);
                const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('liveCount').innerText = count + ' Users Registered';
            } catch(e) {
                document.getElementById('liveCount').innerText = '0 Users Registered';
                console.log(e);
            }
        }
        updateLiveCount();

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const color = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            toast.className = `fixed bottom-4 right-4 ${color} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function guestLogin() {
            document.getElementById('role').value = 'student';
            document.getElementById('username').value = 'guest';
            document.getElementById('password').value = 'guest123';
            await doLogin();
        }

        async function doLogin() {
            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!role || !username || !password) { 
                showToast("Sab fields bharo 😅", 'error'); 
                return; 
            }

            try {
                const userRef = window.dbRef(window.db, `users/${username}`);
                const snapshot = await window.dbGet(userRef);
                if (snapshot.exists()) {
                    const user = snapshot.val();
                    if (user.role === role && user.password === password) {
                        currentUser = user;
                        document.getElementById('loginScreen').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        document.getElementById('userInfo').innerText = `${user.fullName} (${user.role})`;
                        if (user.role === 'admin') {
                            document.getElementById('adminPanel').classList.remove('hidden');
                            document.getElementById('userManagePanel').classList.remove('hidden');
                            document.getElementById('actionHead').classList.remove('hidden');
                        }
                        showStudents();
                        showToast(`Welcome back, ${user.fullName}! 🎉`);
                    } else { 
                        showToast("Galat Password ya Role! 🤔", 'error'); 
                    }
                } else { 
                    showToast("User nahi mila! 📞", 'error'); 
                }
            } catch(e) {
                showToast("Firebase error! Rules check karo 🔥", 'error');
                console.log(e);
            }
        }

        function doLogout() {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('userManagePanel').classList.add('hidden');
            document.getElementById('actionHead').classList.add('hidden');
            document.getElementById('role').value = ''; 
            document.getElementById('username').value = ''; 
            document.getElementById('password').value = '';
            showToast("Logout ho gaya! Phir milte hain 👋");
        }

        async function createUser() {
            if (currentUser?.role !== 'admin') return;
            const role = document.getElementById('newUserRole').value;
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const fullName = document.getElementById('newUserFullName').value;
            if(!username || !password || !fullName) { 
                showToast('Sab fields bharo 📝', 'error'); 
                return; 
            }

            const userRef = window.dbRef(window.db, `users/${username}`);
            const snapshot = await window.dbGet(userRef);
            if (snapshot.exists()) { 
                showToast('Ye username pehle se hai! 😅', 'error'); 
                return; 
            }

            await window.dbSet(userRef, { role, username, password, fullName });
            showToast(`User ban gaya! ${username} ab login kar sakta hai 🎉`);
            document.getElementById('newUsername').value = ''; 
            document.getElementById('newPassword').value = ''; 
            document.getElementById('newUserFullName').value = '';
            updateLiveCount();
        }

        async function getStudents() {
            try {
                const studentsRef = window.dbRef(window.db, 'students');
                const snapshot = await window.dbGet(studentsRef);
                if (snapshot.exists()) { 
                    const data = Object.entries(snapshot.val()).map(([key, val]) => ({...val, key}));
                    document.getElementById('totalStudents').innerText = data.length;
                    return data;
                }
                document.getElementById('totalStudents').innerText = 0;
                return [];
            } catch(e) {
                return [];
            }
        }

        async function saveStudent() {
            if (currentUser?.role !== 'admin') return;
            const name = document.getElementById('name').value; 
            const roll = document.getElementById('roll').value;
            const course = document.getElementById('course').value; 
            const email = document.getElementById('email').value;
            const editIndex = document.getElementById('editIndex').value;
            if(!name || !roll || !course) { 
                showToast('Name, Roll No, Course zaruri hai 📚', 'error'); 
                return; 
            }

            if (editIndex === '') {
                const newStudentRef = window.dbPush(window.dbRef(window.db, 'students'));
                await window.dbSet(newStudentRef, {name, roll, course, email});
                showToast('Student add ho gaya! 🎓');
            } else {
                await window.dbUpdate(window.dbRef(window.db, `students/${editIndex}`), {name, roll, course, email});
                showToast('Student update ho gaya! ✏️');
            }
            clearForm(); 
            showStudents();
        }

        async function editStudent(key) {
            if (currentUser?.role !== 'admin') return;
            const studentRef = window.dbRef(window.db, `students/${key}`);
            const snapshot = await window.dbGet(studentRef);
            if (snapshot.exists()) {
                const student = snapshot.val();
                document.getElementById('name').value = student.name; 
                document.getElementById('roll').value = student.roll;
                document.getElementById('course').value = student.course; 
                document.getElementById('email').value = student.email || '';
                document.getElementById('editIndex').value = key; 
                window.scrollTo(0, 0);
                showToast('Edit mode on! ✏️');
            }
        }

        async function deleteStudent(key) {
            if (currentUser?.role !== 'admin') return;
            if (confirm('Pakka delete karna hai? 🗑️')) {
                await window.dbRemove(window.dbRef(window.db, `students/${key}`));
                showToast('Student delete ho gaya 🗑️');
                showStudents();
            }
        }

        function clearForm() {
            document.getElementById('name').value = ''; 
            document.getElementById('roll').value = '';
            document.getElementById('course').value = ''; 
            document.getElementById('email').value = ''; 
            document.getElementById('editIndex').value = '';
        }

        async function showStudents() {
            const students = await getStudents();
            const table = document.getElementById('studentTable');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            table.innerHTML = '';
            
            if (students.length === 0) {
                table.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-blue-200">Koi student nahi mila. Pehla student add karo 🚀</td></tr>`;
                return;
            }

            students.forEach((student, index) => {
                if (student.name.toLowerCase().includes(searchText) || 
                    student.roll.toLowerCase().includes(searchText) || 
                    student.course.toLowerCase().includes(searchText)) {
                    table.innerHTML += `<tr class="border-b border-white/10 hover:bg-white/5">
                        <td class="p-3">${index + 1}</td>
                        <td class="p-3 font-medium">${student.name}</td>
                        <td class="p-3">${student.roll}</td>
                        <td class="p-3">${student.course}</td>
                        <td class="p-3">${student.email || '-'}</td>
                        <td class="p-3 ${currentUser?.role === 'admin' ? '' : 'hidden'}">
                            <button onclick="editStudent('${student.key}')" class="bg-yellow-500/80 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm mr-1 btn-hover">Edit</button>
                            <button onclick="deleteStudent('${student.key}')" class="bg-red-500/80 hover:bg-red-600 text-white px-3 py-1 rounded text-sm btn-hover">Delete</button>
                        </td></tr>`;
                }
            });
            lucide.createIcons();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF(); 
            const students = await getStudents();
            doc.setFontSize(18); 
            doc.text("EduVerse - Student List", 14, 20);
            const tableData = students.map((s, i) => [i+1, s.name, s.roll, s.course, s.email || '-']);
            doc.autoTable({ 
                head: [['S.No', 'Name', 'Roll No', 'Course', 'Email']], 
                body: tableData, 
                startY: 35,
                theme: 'grid'
            });
            doc.save('EduVerse_Students.pdf');
            showToast('PDF download ho gaya! 📄');
        }

        window.doLogin = doLogin;
        window.guestLogin = guestLogin;
        window.doLogout = doLogout;
        window.createUser = createUser;
        window.saveStudent = saveStudent;
        window.editStudent = editStudent;
        window.deleteStudent = deleteStudent;
        window.downloadPDF = downloadPDF;
        window.showStudents = showStudents;
    </script>
</body>
</html>
